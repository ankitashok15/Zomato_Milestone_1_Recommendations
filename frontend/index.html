<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomato AI - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Zomato AI Recommender</div>
      <nav class="nav-pill" aria-label="Main">
        <a class="nav-icon--home nav-icon--active" href="/ui" title="Home" aria-current="page">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path
              d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4H2.5z"
            />
          </svg>
          <span class="sr-only">Home</span>
        </a>
        <a class="nav-icon--alt" href="/static/history.html" title="History">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z" />
            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z" />
          </svg>
          <span class="sr-only">History</span>
        </a>
        <a class="nav-icon--alt" href="/static/metrics.html" title="Metrics">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path
              d="M4 11H2v3h2v-3zm5-4H7v7h2V7zm5-5v12h-2V2h2zm-2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-2zM6 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-3z"
            />
          </svg>
          <span class="sr-only">Metrics</span>
        </a>
      </nav>
    </header>
    <div class="divider-trio" aria-hidden="true"><span></span><span></span><span></span></div>

    <main class="container">
      <section class="panel">
        <h2>Request Settings</h2>
        <div class="grid two">
          <label>
            Top K Results
            <input id="topK" type="number" min="1" max="10" value="5" />
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Find Restaurants</h2>
        <form id="recommendationForm">
          <div class="grid two">
            <label>
              Locality
              <select id="location" required>
                <option value="" disabled selected>Loading localities…</option>
              </select>
            </label>
            <label>
              Max budget (INR, cost for two)
              <input id="budgetAmount" type="number" min="50" max="100000" step="50" value="1200" required />
            </label>
            <label>
              Cuisine
              <select id="cuisine" multiple size="5">
                <option value="" disabled>Loading cuisines…</option>
              </select>
              <span class="muted field-hint">Ctrl/Cmd + click to select multiple</span>
            </label>
            <label>Minimum Rating<input id="minRating" type="number" min="0" max="5" step="0.1" value="3.8" /></label>
            <label>Party Type (optional)<input id="partyType" placeholder="family / friends" /></label>
            <label>Service Expectation (optional)<input id="serviceExpectation" placeholder="quick service" /></label>
          </div>
          <label style="margin-top: 12px;">
            Additional Preferences
            <textarea id="freeText" placeholder="family-friendly, outdoor seating..."></textarea>
          </label>
          <div class="row">
            <button type="submit">Get Recommendations</button>
            <button id="healthBtn" type="button" class="secondary">Health Check</button>
          </div>
        </form>
        <p id="status" class="status muted"></p>
      </section>

      <section class="panel">
        <h2>Results</h2>
        <p id="summary" class="muted"></p>
        <div id="results"></div>
      </section>
    </main>

    <script src="/static/assets/app.js"></script>
  </body>
</html>
